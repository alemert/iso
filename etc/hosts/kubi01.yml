user-data:
  autoinstall:
    identity:
      hostname: kubi01
    network:
      version: 2
      ethernets:
        all-eth:
          match:
            name: "*"
          dhcp4: true
          dhcp4-overrides:
            send-hostname: true
            hostname: kubi01

meta-data:
  instance-id: iid-kubi01
  local-hostname: kubi01
