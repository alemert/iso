autoinstall:
  grub:
    reorder_uefi: true  # UEFI profile prefers booting installed disk first
  storage:
    config:
      # EFI System Partition (ESP) for UEFI firmware and GRUB boot files.
      - id: part-efi
        type: partition
        device: disk-install
        size: 512M
        flag: boot
        grub_device: true

      # Format the EFI partition as FAT32 (required for UEFI boot).
      - id: fs-efi
        type: format
        volume: part-efi
        fstype: fat32

      # Mount the EFI partition to the standard UEFI path.
      - id: mnt-efi
        type: mount
        device: fs-efi
        path: /boot/efi
